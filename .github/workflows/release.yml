name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-dryrun"

permissions:
  contents: read

jobs:
  build-matrix:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo build
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ runner.os == 'macOS' && '11.0' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test binary
        run: ./target/${{ matrix.target }}/release/wpl-check help >/dev/null

      - name: Package artifacts
        run: |
          set -euo pipefail
          ARTIFACT_BASE="${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/${ARTIFACT_BASE}"
          cp -av target/${{ matrix.target }}/release/wpl-check "dist/${ARTIFACT_BASE}/"
          cp -av README.md LICENSE "dist/${ARTIFACT_BASE}/"
          tar -C dist -czf "${ARTIFACT_BASE}.tar.gz" "${ARTIFACT_BASE}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        continue-on-error: true
        with:
          subject-path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}
          path: ${{ github.event.repository.name }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-matrix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ github.event.repository.name }}-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-dryrun') }}
          files: artifacts/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
